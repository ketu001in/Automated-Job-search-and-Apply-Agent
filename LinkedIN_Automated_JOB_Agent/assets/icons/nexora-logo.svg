<svg viewBox="0 0 260 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nexora">
  <defs>
    <linearGradient id="ngTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ngArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Left vertical of N -->
    <line x1="7" y1="56" x2="7" y2="14" stroke="url(#ngTop)" stroke-width="6" stroke-linecap="round"/>
    <!-- Diagonal of N (top-left to bottom-right) -->
    <line x1="7" y1="14" x2="33" y2="54" stroke="url(#ngTop)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right vertical — goes up into arrow instead of straight down -->
    <line x1="33" y1="14" x2="33" y2="54" stroke="url(#ngTop)" stroke-width="6" stroke-linecap="round"/>
    <!-- Arrow shaft: from right-vertical midpoint, shoots up-right -->
    <line x1="33" y1="30" x2="52" y2="8" stroke="url(#ngArrow)" stroke-width="5" stroke-linecap="round"/>
    <!-- Arrow head (two lines forming >  pointing up-right) -->
    <polyline points="41,6 52,6 52,17" fill="none" stroke="url(#ngArrow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark NEXORA -->
  <text x="66" y="46"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
        font-size="30" font-weight="900" letter-spacing="3"
        fill="url(#ngTop)">NEXORA</text>
</svg>
